# NOTE: move this file to .github/workflows/release.yml to activate it.
# It lives here only because the GitHub token used to author this PR
# lacks the `workflow` OAuth scope and so cannot write inside
# .github/workflows/. The file's contents are unchanged from the
# intended final location.
#
# Builds the Android APK and publishes a GitHub Release when a v* tag is pushed.
#
# Triggered by tags like:
#   v1.2.3-alpha   -> published as pre-release
#   v1.2.3-beta.2  -> published as pre-release
#   v1.2.3-rc.1    -> published as pre-release
#   v1.2.3         -> published as a regular release
#
# Signing
# -------
# If the repository defines the following secrets, the workflow produces a
# signed release APK using the project's release signing config:
#   ANDROID_KEYSTORE_BASE64   base64-encoded JKS keystore file
#   DEFIDE_STORE_PASSWORD     keystore password
#   DEFIDE_KEY_PASSWORD       key password for the "defide" alias
#
# Without those secrets, the workflow still builds a release APK; it will be
# unsigned (you'll need to sign it locally with apksigner before sideloading).

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$HOME/.android"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$HOME/.android/defide-release.jks"

      - name: Build release APK
        env:
          DEFIDE_STORE_PASSWORD: ${{ secrets.DEFIDE_STORE_PASSWORD }}
          DEFIDE_KEY_PASSWORD: ${{ secrets.DEFIDE_KEY_PASSWORD }}
        run: ./gradlew --no-daemon assembleRelease

      - name: Locate APK
        id: apk
        run: |
          set -euo pipefail
          apk=$(find app/build/outputs/apk/release -maxdepth 1 -name '*.apk' | head -n1)
          if [ -z "$apk" ]; then
            echo "No APK produced under app/build/outputs/apk/release/" >&2
            exit 1
          fi
          tag="${GITHUB_REF_NAME}"
          renamed="idlefantasy-${tag}.apk"
          cp "$apk" "$renamed"
          echo "path=$renamed" >> "$GITHUB_OUTPUT"
          echo "name=$renamed" >> "$GITHUB_OUTPUT"

      - name: Determine pre-release flag
        id: prerelease
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" =~ -(alpha|beta|rc) ]]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.value }}
          files: ${{ steps.apk.outputs.path }}
