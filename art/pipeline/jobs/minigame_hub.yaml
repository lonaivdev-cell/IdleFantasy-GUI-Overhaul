# Minigame Hub — 51 entries
# Run:  python3 -m art.pipeline.ai.run --jobs art/pipeline/jobs/minigame_hub.yaml
#
# Covers the full market-center asset set: 1 background, 5 stations, 6 decor,
# 12 player frames (4-dir walk + idle), 2 joystick parts, 1 vendor NPC, and
# 24 minigame props across smithing / runecrafting / herblore / cooking.
#
# Per-job pixelize.target_size differs by sprite kind so the in-world scale
# is sensible: player 32px, decor/props 48px, sword & runic close-ups 64px,
# joystick base 96px, stations 128px, plaza background 512px.
#
# Seeds: 4001–4051 (mining uses 1001+; this block leaves room to grow).
# All prompts follow the locked style:
#   "pixel art, 16-bit RPG <kind> of <SUBJECT>, <DETAIL>, plain white
#    background, top-down 3/4 view, crisp pixels, no shadows".

defaults:
  width: 1024
  height: 1024
  steps: 25
  cfg: 7.0
  lora_scale: 1.0
  sampler: dpmpp_2m_karras
  negative: >-
    blurry, photo, smooth, anti-aliased, gradient, 3d render, low quality,
    signature, watermark, text, painted, oil painting, realistic, modern,
    futuristic, neon
  pixelize:
    target_size: 48
    palette_size: 16
  bg_model: birefnet-general

jobs:
  # ------------------------------------------------------------------
  # Background — full-screen ground plate, large pixelize target.
  # Prompt fills the frame edge-to-edge so bg-removal leaves it opaque.
  # ------------------------------------------------------------------
  - entity_id: plaza_floor
    seed: 4001
    prompt: >-
      pixel art, 16-bit RPG top-down ground texture of a medieval market
      plaza, warm sandy cobblestone pavers with patches of dirt and grass
      between the stones, hint of straw and footprints, earth tones, edge
      to edge with no border, no characters, no buildings, no props, crisp
      pixels, no shadows
    pixelize:
      target_size: 512
      palette_size: 24

  # ------------------------------------------------------------------
  # Stations — buildings/structures, larger pixelize target.
